<!DOCTYPE html>
<html>
<head>
    <title>Registrarse</title>
    <link rel="stylesheet" href="../Styles/styles.css">
</head>
<body>

    <h1>Nombre del proyecto</h1>

    <div class="caja-login">
        <h2>Crear cuenta</h2>
        <p>Es gratis, siempre lo será.</p>

        <br>

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre">

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="Tu apellido">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ejemplo@email.com">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">

        <label for="confirm-password">Repetir contraseña</label>
        <input type="password" id="confirm-password" placeholder="Repetí tu contraseña">

        <p class="texto-terminos">
            Al registrarte aceptás los <a href="#">Términos y condiciones</a> y la <a href="#">Política de privacidad</a>.
        </p>

        <button class="boton-login">Registrarse</button>

        <hr class="linea">

        <p class="texto-registro">
            ¿Ya tenés cuenta? <a href="index.html">Iniciar sesión</a>
        </p>
    </div>

</body>
</html>
